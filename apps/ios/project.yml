name: Pulsefolio
options:
  bundleIdPrefix: com.pulsefolio
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  Pulsefolio:
    type: application
    platform: iOS
    sources:
      - Pulsefolio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pulsefolio.app
        INFOPLIST_KEY_CFBundleDisplayName: Pulsefolio
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
    info:
      path: Pulsefolio/Info.plist
      properties:
        CFBundleDisplayName: Pulsefolio
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
  PulsefolioUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PulsefolioUITests
    dependencies:
      - target: Pulsefolio
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Pulsefolio
schemes:
  Pulsefolio:
    build:
      targets:
        Pulsefolio: all
    run:
      config: Debug
      environmentVariables:
        API_URL: http://localhost:8000
    test:
      config: Debug
      targets:
        - PulsefolioUITests
