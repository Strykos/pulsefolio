# Render Blueprint — Pulsefolio (free tier)

databases:
  - name: pulsefolio-db
    plan: free
    databaseName: pulsefolio
    user: pulsefolio

services:
  - type: web
    name: pulsefolio-api
    runtime: python
    plan: free
    rootDir: services/api
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsefolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: rules
      - key: CORS_ORIGINS
        value: https://pulsefolio-web.onrender.com,http://localhost:3000
      - key: PYTHON_VERSION
        value: "3.12.8"

  - type: web
    name: pulsefolio-web
    runtime: static
    plan: free
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    staticPublishPath: apps/web/out
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: NEXT_PUBLIC_API_URL
        value: https://pulsefolio-api.onrender.com
