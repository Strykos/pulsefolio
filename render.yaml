# Render Blueprint — Pulsefolio API + Postgres (web hosted on Vercel)

databases:
  - name: pulsefolio-db
    plan: free
    databaseName: pulsefolio
    user: pulsefolio

services:
  - type: web
    name: pulsefolio-api
    runtime: python
    plan: free
    rootDir: services/api
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsefolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: rules
      - key: CORS_ORIGINS
        value: https://pulsefolio-five.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: "3.12.8"
